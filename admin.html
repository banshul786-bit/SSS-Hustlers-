<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel | SSC Hustlers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0b1437; --card: #131d45; --card2: #1a2455;
      --gold: #d4a843; --gl: #f0c96a;
      --white: #fff; --text: #e8ecf7; --muted: #8a95b0;
      --green: #34c759; --red: #ff3b30; --blue: #00c6ff;
    }
    body { background: var(--navy); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 5%; background: rgba(11,20,55,.97);
      border-bottom: 1px solid rgba(212,168,67,.12);
      position: sticky; top: 0; z-index: 100;
    }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 900; color: var(--white); }
    .logo-text span { color: var(--gold); }
    .admin-badge { background: rgba(212,168,67,.15); border: 1px solid rgba(212,168,67,.4); color: var(--gold); padding: .3rem .8rem; border-radius: 50px; font-size: .75rem; font-weight: 700; }
    .btn-back { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: var(--text); padding: .38rem .9rem; border-radius: 8px; font-size: .82rem; font-weight: 600; cursor: pointer; font-family: inherit; text-decoration: none; }

    main { max-width: 900px; margin: 0 auto; padding: 2rem 5%; }

    /* Password Gate */
    #password-gate {
      display: flex; align-items: center; justify-content: center;
      min-height: 80vh;
    }
    .gate-box {
      background: var(--card); border: 1px solid rgba(212,168,67,.2);
      border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 380px; text-align: center;
    }
    .gate-icon { font-size: 3rem; margin-bottom: 1rem; }
    .gate-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; margin-bottom: .4rem; }
    .gate-sub { color: var(--muted); font-size: .88rem; margin-bottom: 1.8rem; }

    /* Form Styles */
    .section { background: var(--card); border: 1px solid rgba(255,255,255,.07); border-radius: 18px; padding: 1.8rem; margin-bottom: 2rem; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: .6rem; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: .8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    input, textarea, select {
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: .7rem 1rem; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .92rem;
      transition: border-color .2s; width: 100%;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: rgba(212,168,67,.5); }
    select option { background: var(--navy); }
    textarea { resize: vertical; min-height: 80px; }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gl));
      color: var(--navy); border: none; border-radius: 10px;
      padding: .8rem 2rem; font-size: .95rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all .2s; width: 100%;
    }
    .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* Toast */
    #toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--card2); border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: .8rem 1.5rem;
      font-size: .9rem; font-weight: 600; z-index: 999;
      transition: transform .3s ease; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(52,199,89,.4); color: var(--green); }
    #toast.error { border-color: rgba(255,59,48,.4); color: #ff6b6b; }

    /* Quiz List */
    .quiz-list { display: flex; flex-direction: column; gap: .8rem; }
    .quiz-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px; padding: 1rem 1.2rem; gap: 1rem;
    }
    .qi-left { display: flex; align-items: center; gap: .8rem; flex: 1; min-width: 0; }
    .qi-icon { font-size: 1.5rem; flex-shrink: 0; }
    .qi-title { font-weight: 600; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .qi-meta { font-size: .75rem; color: var(--muted); margin-top: .15rem; }
    .qi-actions { display: flex; gap: .5rem; flex-shrink: 0; }
    .btn-edit { background: rgba(0,198,255,.1); border: 1px solid rgba(0,198,255,.25); color: var(--blue); padding: .35rem .8rem; border-radius: 8px; font-size: .8rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-delete { background: rgba(255,59,48,.1); border: 1px solid rgba(255,59,48,.25); color: #ff6b6b; padding: .35rem .8rem; border-radius: 8px; font-size: .8rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .badge-live { background: rgba(52,199,89,.12); color: var(--green); border: 1px solid rgba(52,199,89,.25); padding: .2rem .6rem; border-radius: 50px; font-size: .7rem; font-weight: 700; }
    .badge-soon { background: rgba(138,149,176,.1); color: var(--muted); border: 1px solid rgba(138,149,176,.2); padding: .2rem .6rem; border-radius: 50px; font-size: .7rem; font-weight: 700; }

    .empty-state { text-align: center; color: var(--muted); padding: 2rem; font-size: .9rem; }

    .spinner { width: 28px; height: 28px; border: 3px solid rgba(212,168,67,.2); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin: 1rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media(max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .qi-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo-text">SSC <span>Hustlers</span></div>
  <div style="display:flex;align-items:center;gap:.8rem">
    <span class="admin-badge">🔐 Admin</span>
    <a href="dashboard.html" class="btn-back">← Dashboard</a>
  </div>
</nav>

<!-- PASSWORD GATE -->
<div id="password-gate">
  <div class="gate-box">
    <div class="gate-icon">🔐</div>
    <div class="gate-title">Admin Access</div>
    <div class="gate-sub">Sirf admin ke liye. Password daalo.</div>
    <div class="form-group" style="margin-bottom:1rem;text-align:left">
      <label>Password</label>
      <input type="password" id="admin-pass" placeholder="Admin password..." onkeydown="if(event.key==='Enter')checkPassword()"/>
    </div>
    <button class="btn-primary" onclick="checkPassword()">🚀 Enter Admin Panel</button>
    <div id="pass-error" style="color:#ff6b6b;font-size:.82rem;margin-top:.8rem;display:none">❌ Wrong password!</div>
  </div>
</div>

<!-- ADMIN PANEL (hidden until password) -->
<main id="admin-panel" style="display:none">

  <!-- ADD / EDIT QUIZ -->
  <div class="section">
    <div class="section-title">➕ <span id="form-title">Naya Quiz Add Karo</span></div>

    <div class="form-grid">
      <div class="form-group">
        <label>Quiz ID (unique, no spaces)</label>
        <input type="text" id="f-id" placeholder="e.g. maths-3, english-1"/>
      </div>
      <div class="form-group">
        <label>Quiz Title</label>
        <input type="text" id="f-title" placeholder="e.g. Maths Module-3"/>
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea id="f-desc" placeholder="Topics covered in this quiz..."></textarea>
      </div>
      <div class="form-group">
        <label>Icon (emoji)</label>
        <input type="text" id="f-icon" placeholder="📐" value="📝"/>
      </div>
      <div class="form-group">
        <label>Subject</label>
        <select id="f-subject">
          <option value="maths">Maths</option>
          <option value="reasoning">Reasoning & GK</option>
          <option value="english">English</option>
          <option value="general">General</option>
        </select>
      </div>
      <div class="form-group">
        <label>Total Questions</label>
        <input type="number" id="f-questions" value="30" min="1"/>
      </div>
      <div class="form-group">
        <label>⏱ Time Limit (minutes)</label>
        <input type="number" id="f-duration" value="30" min="1" placeholder="e.g. 30"/>
      </div>
      <div class="form-group">
        <label>Total Marks</label>
        <input type="number" id="f-marks" value="90" min="1"/>
      </div>
      <div class="form-group">
        <label>Quiz HTML File URL</label>
        <input type="text" id="f-url" placeholder="e.g. quiz3.html"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="live">🟢 Live</option>
          <option value="coming-soon">🔒 Coming Soon</option>
        </select>
      </div>
    </div>

    <div style="margin-top:1.5rem;display:flex;gap:.8rem">
      <button class="btn-primary" id="save-btn" onclick="saveQuiz()">💾 Quiz Save Karo</button>
      <button class="btn-primary" id="cancel-btn" onclick="cancelEdit()" style="display:none;background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.15)">✕ Cancel</button>
    </div>
  </div>

  <!-- EXISTING QUIZZES -->
  <div class="section">
    <div class="section-title">📋 Saari Quizzes</div>
    <div class="quiz-list" id="quiz-list">
      <div class="spinner"></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://bszikpzoiwzvrjovuunx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzemlrcHpvaXd6dnJqb3Z1dW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjY5MzYsImV4cCI6MjA4ODE0MjkzNn0.jaUjPNQTLSAioq4rF-xHzPujftqnhnFXC5P2S8SKmgU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── CHANGE THIS PASSWORD ──
const ADMIN_PASSWORD = 'ssc@admin2025';

let editingId = null;

function checkPassword() {
  const val = document.getElementById('admin-pass').value;
  if (val === ADMIN_PASSWORD) {
    document.getElementById('password-gate').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadQuizzes();
  } else {
    document.getElementById('pass-error').style.display = 'block';
    document.getElementById('admin-pass').value = '';
  }
}

// ── LOAD ALL QUIZZES ──
async function loadQuizzes() {
  const list = document.getElementById('quiz-list');
  list.innerHTML = '<div class="spinner"></div>';

  const { data, error } = await sb.from('quizzes').select('*').order('created_at', { ascending: true });

  if (error || !data || data.length === 0) {
    list.innerHTML = '<div class="empty-state">Koi quiz nahi abhi. Upar se add karo! 👆</div>';
    return;
  }

  list.innerHTML = data.map(q => `
    <div class="quiz-item" id="qi-${q.id}">
      <div class="qi-left">
        <div class="qi-icon">${q.icon || '📝'}</div>
        <div>
          <div class="qi-title">${q.title}</div>
          <div class="qi-meta">${q.questions_count} Qs • ${q.duration_mins} Min • ${q.marks} Marks • ${q.quiz_url || 'No URL'}</div>
        </div>
      </div>
      <span class="${q.status === 'live' ? 'badge-live' : 'badge-soon'}">${q.status === 'live' ? 'Live' : 'Soon'}</span>
      <div class="qi-actions">
        <button class="btn-edit" onclick="editQuiz('${q.id}')">✏️ Edit</button>
        <button class="btn-delete" onclick="deleteQuiz('${q.id}', '${q.title}')">🗑 Delete</button>
      </div>
    </div>
  `).join('');
}

// ── SAVE QUIZ (Add or Update) ──
async function saveQuiz() {
  const id = document.getElementById('f-id').value.trim().replace(/\s+/g, '-').toLowerCase();
  const title = document.getElementById('f-title').value.trim();

  if (!id || !title) { showToast('ID aur Title zaroori hai!', 'error'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  const payload = {
    id,
    title,
    description: document.getElementById('f-desc').value.trim(),
    icon: document.getElementById('f-icon').value.trim() || '📝',
    subject: document.getElementById('f-subject').value,
    questions_count: parseInt(document.getElementById('f-questions').value) || 30,
    duration_mins: parseInt(document.getElementById('f-duration').value) || 30,
    marks: parseInt(document.getElementById('f-marks').value) || 90,
    quiz_url: document.getElementById('f-url').value.trim(),
    status: document.getElementById('f-status').value,
  };

  let error;
  if (editingId) {
    ({ error } = await sb.from('quizzes').update(payload).eq('id', editingId));
  } else {
    ({ error } = await sb.from('quizzes').insert(payload));
  }

  btn.disabled = false;
  btn.textContent = '💾 Quiz Save Karo';

  if (error) {
    showToast('Error: ' + (error.message || 'Kuch gadbad!'), 'error');
  } else {
    showToast(editingId ? '✅ Quiz update ho gayi!' : '✅ Naya quiz add ho gaya!', 'success');
    cancelEdit();
    loadQuizzes();
  }
}

// ── EDIT QUIZ ──
async function editQuiz(id) {
  const { data } = await sb.from('quizzes').select('*').eq('id', id).single();
  if (!data) return;

  editingId = id;
  document.getElementById('f-id').value = data.id;
  document.getElementById('f-id').disabled = true;
  document.getElementById('f-title').value = data.title;
  document.getElementById('f-desc').value = data.description || '';
  document.getElementById('f-icon').value = data.icon || '📝';
  document.getElementById('f-subject').value = data.subject || 'general';
  document.getElementById('f-questions').value = data.questions_count || 30;
  document.getElementById('f-duration').value = data.duration_mins || 30;
  document.getElementById('f-marks').value = data.marks || 90;
  document.getElementById('f-url').value = data.quiz_url || '';
  document.getElementById('f-status').value = data.status || 'live';

  document.getElementById('form-title').textContent = '✏️ Quiz Edit Karo: ' + data.title;
  document.getElementById('save-btn').textContent = '💾 Update Karo';
  document.getElementById('cancel-btn').style.display = 'block';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── DELETE QUIZ ──
async function deleteQuiz(id, title) {
  if (!confirm(`"${title}" delete karna chahte ho? Yeh wapas nahi aayegi!`)) return;

  const { error } = await sb.from('quizzes').delete().eq('id', id);
  if (error) {
    showToast('Delete nahi hua: ' + error.message, 'error');
  } else {
    showToast('🗑 Quiz delete ho gayi!', 'success');
    loadQuizzes();
  }
}

// ── CANCEL EDIT ──
function cancelEdit() {
  editingId = null;
  document.getElementById('f-id').value = '';
  document.getElementById('f-id').disabled = false;
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-icon').value = '📝';
  document.getElementById('f-subject').value = 'maths';
  document.getElementById('f-questions').value = 30;
  document.getElementById('f-duration').value = 30;
  document.getElementById('f-marks').value = 90;
  document.getElementById('f-url').value = '';
  document.getElementById('f-status').value = 'live';
  document.getElementById('form-title').textContent = 'Naya Quiz Add Karo';
  document.getElementById('save-btn').textContent = '💾 Quiz Save Karo';
  document.getElementById('cancel-btn').style.display = 'none';
}

// ── TOAST ──
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => { t.className = ''; }, 3000);
}
</script>
</body>
</html>
